<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>26A03 Class Hub</title>
<style>
:root{
  --bg:#f6f7fb;--card:#ffffff;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;
  --brand:#2563eb;--birthday:#fef3c7;--homework:#dcfce7;--event:#fce7f3;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink)}
header{background:linear-gradient(135deg,#2563eb,#7c3aed);color:white;padding:24px 16px;text-align:center}
header h1{margin:0;font-size:28px} header p{margin:8px 0 0;opacity:.9}
nav{position:sticky;top:0;z-index:10;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;background:white;border-bottom:1px solid var(--line);padding:10px}
nav button{border:0;background:#eef2ff;padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:700}
nav button.active{background:var(--brand);color:white}
main{max-width:1100px;margin:auto;padding:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;margin-bottom:18px;box-shadow:0 8px 20px rgba(0,0,0,.04)}
h2{margin-top:0} .row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:12px;font-size:15px;background:white}
textarea{min-height:80px;margin-top:10px}
.primary{background:var(--brand);color:white;border:0;border-radius:12px;padding:11px 14px;cursor:pointer;font-weight:700;margin-top:10px}
.danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;border-radius:10px;padding:7px 9px;cursor:pointer}
.tabs{display:none} .tabs.active{display:block}
.calendar-top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.calendar-controls{display:flex;gap:8px;flex-wrap:wrap}
.calendar-controls button{border:1px solid var(--line);background:white;padding:8px 12px;border-radius:999px;cursor:pointer}
.calendar-controls button.active{background:var(--brand);color:white}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.grid.weekly .day{min-height:520px} .grid.fortnightly .day{min-height:250px} .grid.monthly .day{min-height:112px}
.day-name{text-align:center;font-weight:700;color:var(--muted);padding:8px}
.day{background:#fafafa;border:1px solid var(--line);border-radius:14px;padding:8px;overflow:hidden}
.day.today{border:2px solid var(--brand)} .day.muted{opacity:.35}
.date-num{font-weight:700;margin-bottom:5px}
.pill{display:block;font-size:12px;padding:5px 6px;border-radius:8px;margin:4px 0;white-space:normal;overflow:visible;text-overflow:clip;line-height:1.25;word-break:break-word}
.pill.birthday{background:var(--birthday)} .pill.homework{background:var(--homework)} .pill.event{background:var(--event)}
.list-item{border:1px solid var(--line);border-radius:14px;padding:12px;margin:10px 0;background:#fff}
.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;font-weight:700;background:#eef2ff;color:#3730a3}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:10px}
.gallery img{width:100%;height:110px;object-fit:cover;border-radius:12px;border:1px solid var(--line)}
.note{color:var(--muted);font-size:14px} .status{font-weight:700;color:#2563eb;margin-top:8px}
@media(max-width:700px){
  header h1{font-size:22px} .grid{gap:5px} .day{min-height:90px;padding:6px}
  .grid.weekly .day{min-height:360px} .grid.fortnightly .day{min-height:175px} .pill{font-size:11px}
}
</style>
</head>
<body>
<header>
  <h1>26A03 Class Hub</h1>
  <p>Shared Calendar • Homework • Class Events</p>
</header>

<nav>
  <button class="active" onclick="showTab('calendar', this)">📅 Calendar</button>
  <button onclick="showTab('homework', this)">📝 Homework</button>
  <button onclick="showTab('events', this)">📸 Class Events</button>
</nav>

<main>
<section id="calendar" class="tabs active">
  <div class="card">
    <div class="calendar-top">
      <h2 id="monthTitle">Calendar</h2>
      <div class="calendar-controls">
        <button onclick="moveDate(-1)">← Previous</button>
        <button onclick="goToday()">Today</button>
        <button onclick="moveDate(1)">Next →</button>
      </div>
    </div>
    <div class="calendar-controls" style="margin-bottom:14px">
      <button id="monthlyBtn" class="active" onclick="setView('monthly')">Monthly</button>
      <button id="fortnightlyBtn" onclick="setView('fortnightly')">Fortnightly</button>
      <button id="weeklyBtn" onclick="setView('weekly')">Weekly</button>
    </div>
    <div class="grid" id="calendarGrid"></div>
  </div>
  <div class="card">
    <h2>Upcoming</h2>
    <div id="upcomingList"></div>
  </div>
</section>

<section id="homework" class="tabs">
  <div class="card">
    <h2>Add Homework / Test / Class Reminder</h2>
    <div class="row">
      <input id="hwTitle" placeholder="Title e.g. Econs Essay Outline" />
      <input id="hwDate" type="date" />
      <select id="hwType">
        <option>Homework</option><option>Test</option><option>Reminder</option><option>Class Event</option>
      </select>
    </div>
    <textarea id="hwDetails" placeholder="Details / instructions"></textarea>
    <button class="primary" onclick="addHomework()">Add to Shared Calendar</button>
    <div id="hwStatus" class="status"></div>
  </div>
  <div class="card">
    <h2>Homework List</h2>
    <div id="homeworkList"></div>
  </div>
</section>

<section id="events" class="tabs">
  <div class="card">
    <h2>📸 Class Events</h2>
    <p class="note">Event updates are shared through Firebase. Photos are uploaded to Google Drive and visible to everyone with the app.</p>
    <div class="row">
      <input id="eventTitle" placeholder="Event name e.g. Class BBQ" />
      <input id="eventDate" type="date" />
    </div>
    <textarea id="eventDesc" placeholder="Description"></textarea>
    <input id="eventPhotos" type="file" accept="image/*" multiple />
    <button class="primary" onclick="addClassEvent()">Save Shared Class Event</button>
    <div id="eventStatus" class="status"></div>
  </div>
  <div class="card">
    <h2>Photo Gallery</h2>
    <input id="eventSearch" placeholder="Search event name..." oninput="renderClassEvents()" />
    <div id="classEventList"></div>
  </div>
</section>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot,
  query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC4ZGc7RJJ8UnvcWYVadIFZqodGRM5Tq7M",
  authDomain: "a03-18f96.firebaseapp.com",
  projectId: "a03-18f96",
  storageBucket: "a03-18f96.firebasestorage.app",
  messagingSenderId: "149308288995",
  appId: "1:149308288995:web:d6a393ad9c3dacf893fad6"
};
const PHOTO_UPLOAD_URL = "https://script.google.com/macros/s/AKfycbxErmDezeltUo9EE8iFGPeeqNbJacXGL80Jt862pLYauPEwdjPtbPTrzcpnQo7m5ZlMAQ/exec";
const ADMIN_PIN = "0804";

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const birthdays = [
  ["Annthea","06/12/2009"],["Brandon","29/05/2009"],["Chanelle","03/03/2009"],["Chloe","16/03/2009"],
  ["Clarissa","30/09/2009"],["Wen Jie","06/10/2009"],["Kai","28/08/2008"],["Lucien","28/10/2009"],
  ["Ernest","30/07/2009"],["Jessandra","04/06/2009"],["Lily","08/10/2008"],["Elva","07/03/2009"],
  ["Verlynn","04/08/2009"],["Zhi Qi","26/04/2009"],["Jordan","06/02/2009"],["Meredith","11/12/2009"],
  ["Miller","28/02/2009"],["Nicole","26/02/2009"],["Javien","11/11/2009"],["Rayirth","17/02/2009"],
  ["Benjamin","01/03/2009"],["Xuan You","26/02/2009"],["Emma","07/01/2009"],["Jensen","01/01/2009"],
  ["Natalie","01/06/2009"],["Tess","12/02/2009"]
];

let homework = [];
let classEvents = [];
let currentDate = new Date();
let viewMode = "monthly";

function showTab(id, btn){
  document.querySelectorAll(".tabs").forEach(t=>t.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}
window.showTab = showTab;

function parseDMY(dmy){ const [d,m,y] = dmy.split("/").map(Number); return {d,m,y}; }
function isoDate(date){ return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`; }
function birthdayIsoThisYear(dmy, year){ const x = parseDMY(dmy); return `${year}-${String(x.m).padStart(2,"0")}-${String(x.d).padStart(2,"0")}`; }
function formatDate(iso){ if(!iso) return ""; return new Date(iso+"T00:00:00").toLocaleDateString("en-SG",{day:"numeric",month:"short",year:"numeric"}); }
function startOfWeek(date){ const d = new Date(date); d.setDate(d.getDate() - d.getDay()); d.setHours(0,0,0,0); return d; }

function setView(mode){
  viewMode = mode;
  document.getElementById("monthlyBtn").classList.toggle("active", mode==="monthly");
  document.getElementById("fortnightlyBtn").classList.toggle("active", mode==="fortnightly");
  document.getElementById("weeklyBtn").classList.toggle("active", mode==="weekly");
  renderCalendar();
}
window.setView = setView;

function moveDate(step){
  if(viewMode==="monthly") currentDate.setMonth(currentDate.getMonth()+step);
  if(viewMode==="fortnightly") currentDate.setDate(currentDate.getDate()+(step*14));
  if(viewMode==="weekly") currentDate.setDate(currentDate.getDate()+(step*7));
  renderCalendar();
}
window.moveDate = moveDate;
function goToday(){ currentDate = new Date(); renderCalendar(); }
window.goToday = goToday;

function getItemsForDate(date){
  const iso = isoDate(date);
  const year = date.getFullYear();
  const bdays = birthdays.filter(([name,dob]) => birthdayIsoThisYear(dob, year) === iso).map(([name]) => ({type:"birthday", title:`🎂 ${name}`}));
  const hw = homework.filter(h => h.date === iso).map(h => ({type:"homework", title:`📝 ${h.title}`}));
  const ev = classEvents.filter(e => e.date === iso).map(e => ({type:"event", title:`📸 ${e.title}`}));
  return [...bdays, ...hw, ...ev];
}

function renderCalendar(){
  const grid = document.getElementById("calendarGrid");
  grid.className = "grid " + viewMode;
  grid.innerHTML = "";
  ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].forEach(day=>{
    const div = document.createElement("div");
    div.className = "day-name";
    div.textContent = day;
    grid.appendChild(div);
  });
  let start, daysToShow, title;
  if(viewMode==="monthly"){
    const first = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
    start = startOfWeek(first);
    const last = new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 0);
    const end = startOfWeek(last); end.setDate(end.getDate()+6);
    daysToShow = Math.round((end-start)/(1000*60*60*24))+1;
    title = currentDate.toLocaleDateString("en-SG",{month:"long",year:"numeric"});
  } else if(viewMode==="fortnightly"){
    start = startOfWeek(currentDate); daysToShow = 14;
    const end = new Date(start); end.setDate(end.getDate()+13);
    title = `${formatDate(isoDate(start))} – ${formatDate(isoDate(end))}`;
  } else {
    start = startOfWeek(currentDate); daysToShow = 7;
    const end = new Date(start); end.setDate(end.getDate()+6);
    title = `${formatDate(isoDate(start))} – ${formatDate(isoDate(end))}`;
  }
  document.getElementById("monthTitle").textContent = title;
  const todayIso = isoDate(new Date());
  for(let i=0;i<daysToShow;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const div = document.createElement("div");
    div.className = "day";
    if(viewMode==="monthly" && d.getMonth() !== currentDate.getMonth()) div.classList.add("muted");
    if(isoDate(d)===todayIso) div.classList.add("today");
    div.innerHTML = `<div class="date-num">${d.getDate()}</div>`;
    getItemsForDate(d).forEach(item=> div.innerHTML += `<span class="pill ${item.type}">${item.title}</span>`);
    grid.appendChild(div);
  }
  renderUpcoming();
}

async function addHomework(){
  const title = document.getElementById("hwTitle").value.trim();
  const date = document.getElementById("hwDate").value;
  const type = document.getElementById("hwType").value;
  const details = document.getElementById("hwDetails").value.trim();
  if(!title || !date){ alert("Please enter title and due date."); return; }
  document.getElementById("hwStatus").textContent = "Saving...";
  await addDoc(collection(db, "homework26A03"), { title, date, type, details, createdAt: serverTimestamp() });
  document.getElementById("hwTitle").value=""; document.getElementById("hwDate").value=""; document.getElementById("hwDetails").value="";
  document.getElementById("hwStatus").textContent = "Saved.";
  setTimeout(()=>document.getElementById("hwStatus").textContent="", 1500);
}
window.addHomework = addHomework;

async function deleteHomework(id){
  const pin = prompt("Admin PIN");
  if(pin !== ADMIN_PIN){
    alert("Not authorised.");
    return;
  }
  if(confirm("Delete this homework item?")) await deleteDoc(doc(db, "homework26A03", id));
}
window.deleteHomework = deleteHomework;

function renderHomework(){
  const box = document.getElementById("homeworkList");
  if(!homework.length){ box.innerHTML = "<p class='note'>No homework added yet.</p>"; return; }
  const sorted = [...homework].sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  box.innerHTML = sorted.map(h=>`
    <div class="list-item">
      <span class="badge">${h.type || "Homework"}</span>
      <h3>${h.title || ""}</h3>
      <p><b>Due:</b> ${formatDate(h.date)}</p>
      ${h.details ? `<p>${h.details}</p>` : ""}
      <button class="danger" onclick="deleteHomework('${h.id}')">Delete</button>
    </div>
  `).join("");
}

function renderUpcoming(){
  const today = isoDate(new Date());
  const year = new Date().getFullYear();
  let items = [];
  birthdays.forEach(([name,dob])=>{
    let date = birthdayIsoThisYear(dob, year);
    if(date < today) date = birthdayIsoThisYear(dob, year+1);
    items.push({date, type:"Birthday", title:`${name}'s Birthday`});
  });
  homework.forEach(h=>items.push({date:h.date, type:h.type || "Homework", title:h.title}));
  classEvents.forEach(e=>items.push({date:e.date, type:"Class Event", title:e.title}));
  items = items.filter(x=>x.date>=today).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,8);
  document.getElementById("upcomingList").innerHTML = items.map(x=>`
    <div class="list-item"><span class="badge">${x.type}</span> <b>${x.title}</b><br><span class="note">${formatDate(x.date)}</span></div>
  `).join("");
}

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadPhoto(file){
  const base64 = await fileToBase64(file);
  const response = await fetch(PHOTO_UPLOAD_URL, {
    method: "POST",
    body: JSON.stringify({ file: base64, mimeType: file.type, fileName: file.name })
  });
  if(!response.ok) throw new Error("Photo upload failed");
  return await response.json();
}

async function addClassEvent(){
  const title = document.getElementById("eventTitle").value.trim();
  const date = document.getElementById("eventDate").value;
  const desc = document.getElementById("eventDesc").value.trim();
  const files = [...document.getElementById("eventPhotos").files].slice(0,8);
  if(!title || !date){ alert("Please enter event name and date."); return; }
  const status = document.getElementById("eventStatus");
  status.textContent = "Uploading photos...";
  const photos = [];
  try {
    for(const file of files){
      const uploaded = await uploadPhoto(file);
      photos.push(uploaded);
    }
    status.textContent = "Saving event...";
    await addDoc(collection(db, "classEvents26A03"), { title, date, desc, photos, createdAt: serverTimestamp() });
    document.getElementById("eventTitle").value=""; document.getElementById("eventDate").value=""; document.getElementById("eventDesc").value=""; document.getElementById("eventPhotos").value="";
    status.textContent = "Saved.";
    setTimeout(()=>status.textContent="", 1500);
  } catch(err) {
    console.error(err);
    status.textContent = "Upload failed. Check Apps Script deployment access.";
    alert("Upload failed. Check that Apps Script is deployed as Web App and access is set to Anyone.");
  }
}
window.addClassEvent = addClassEvent;

async function deleteClassEvent(id){
  const pin = prompt("Admin PIN");
  if(pin !== ADMIN_PIN){
    alert("Not authorised.");
    return;
  }
  if(confirm("Delete this event? This removes it from the app, but not from Google Drive.")) await deleteDoc(doc(db, "classEvents26A03", id));
}
window.deleteClassEvent = deleteClassEvent;

function renderClassEvents(){
  const q = (document.getElementById("eventSearch")?.value || "").toLowerCase();
  const filtered = classEvents.filter(e=>(e.title || "").toLowerCase().includes(q)).sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const box = document.getElementById("classEventList");
  if(!filtered.length){ box.innerHTML = "<p class='note'>No class events added yet.</p>"; return; }
  box.innerHTML = filtered.map(e=>`
    <div class="list-item">
      <span class="badge">Class Event</span>
      <h3>${e.title || ""}</h3>
      <p><b>Date:</b> ${formatDate(e.date)}</p>
      ${e.desc ? `<p>${e.desc}</p>` : ""}
      <div class="gallery">${(e.photos||[]).map(p=>`<a href="${p.url}" target="_blank"><img src="https://drive.google.com/thumbnail?id=${p.id}&sz=w600" alt="Class photo"></a>`).join("")}</div>
      <button class="danger" onclick="deleteClassEvent('${e.id}')">Delete Event</button>
    </div>
  `).join("");
}
window.renderClassEvents = renderClassEvents;

onSnapshot(query(collection(db, "homework26A03")), snapshot => {
  homework = snapshot.docs.map(d => ({ id:d.id, ...d.data() }));
  renderHomework(); renderCalendar();
});

onSnapshot(query(collection(db, "classEvents26A03")), snapshot => {
  classEvents = snapshot.docs.map(d => ({ id:d.id, ...d.data() }));
  renderClassEvents(); renderCalendar();
});

renderCalendar();
renderHomework();
renderClassEvents();
</script>
</body>
</html>
